services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "PrestamosP@ss123"
    ports:
      - "1433:1433"
    networks:
      - prestamospro-net

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - prestamospro-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - prestamospro-net

  auth-service:
    build: ~/IdeaProjects/auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=prestamospro;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: PrestamosP@ss123
    depends_on:
      - sqlserver
    networks:
      - prestamospro-net

  cliente-service:
    build: ~/IdeaProjects/cliente-service
    container_name: cliente-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=prestamospro;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: PrestamosP@ss123
    depends_on:
      - sqlserver
    networks:
      - prestamospro-net

  prestamo-service:
    build: ~/IdeaProjects/prestamo-service
    container_name: prestamo-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=prestamospro;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: PrestamosP@ss123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CLIENTE_SERVICE_URL: http://cliente-service:8082
    depends_on:
      - sqlserver
      - kafka
    networks:
      - prestamospro-net

  pago-service:
    build: ~/IdeaProjects/pago-service
    container_name: pago-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=prestamospro;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: PrestamosP@ss123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRESTAMO_SERVICE_URL: http://prestamo-service:8083
    depends_on:
      - sqlserver
      - kafka
    networks:
      - prestamospro-net

  reporte-service:
    build: ~/IdeaProjects/reporte-service
    container_name: reporte-service
    ports:
      - "8085:8085"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AUTH_SERVICE_URL: http://auth-service:8081
      PRESTAMO_SERVICE_URL: http://prestamo-service:8083
      PAGO_SERVICE_URL: http://pago-service:8084
      CLIENTE_SERVICE_URL: http://cliente-service:8082
    depends_on:
      - kafka
    networks:
      - prestamospro-net

  notif-service:
    build: ~/IdeaProjects/notif-service
    container_name: notif-service
    ports:
      - "8086:8086"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - prestamospro-net

networks:
  prestamospro-net:
    driver: bridge